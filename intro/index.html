<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#020805">
  <title>Cosmic Abyss — Prologue</title>
  <link rel="stylesheet" href="./intro.css">
</head>
<body>
  <main class="cinematic" aria-label="Cosmic Abyss cinematic prologue">
    <div class="scene scene-a is-visible" aria-hidden="true"></div>
    <div class="scene scene-b" aria-hidden="true"></div>
    <div class="scene-shade" aria-hidden="true"></div>
    <div class="stars" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <header class="cinematic-header">
      <a class="wordmark" href="../" aria-label="Cosmic Abyss home">
        <span class="wordmark-mark" aria-hidden="true">CA</span>
        <span>COSMIC ABYSS</span>
      </a>
      <div class="header-actions">
        <button class="sound" type="button" data-music aria-pressed="true">
          <span class="sound-bars" aria-hidden="true"><i></i><i></i><i></i></span>
          <span data-music-label>MUSIC ON</span>
        </button>
        <button class="skip" type="button" data-skip>SKIP INTRO <kbd>ESC</kbd></button>
      </div>
    </header>

    <section class="story" aria-live="polite" aria-atomic="true">
      <p class="chapter"></p>
      <h1 class="scene-title"></h1>
      <p class="scene-copy"></p>
      <ul class="crew-manifest" aria-label="Orpheus crew manifest" hidden></ul>
      <p class="scene-signal"></p>
    </section>

    <footer class="cinematic-footer">
      <p class="control-hint"><span>SPACE / → / CLICK</span> CONTINUE</p>
      <button class="continue" type="button" data-continue>CONTINUE</button>
    </footer>

    <div class="transition" aria-hidden="true">
      <span>SYSTEM LINK ESTABLISHED</span>
    </div>
  </main>
  <script type="module" src="./intro.js"></script>
</body>
</html>
